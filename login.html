<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naval - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    
    <div class="login-container">
        <div class="login-image-section">
            <div class="login-quote">
                <h2>"El mundo es un libro, y quienes no viajan leen solo una página."</h2>
                <p>– San Agustín</p>
            </div>
        </div>

        <div class="login-form-section">
            <div class="login-form-wrapper">
                
                <div class="login-logo">
                    <div class="logo-icon">N</div>
                    <span class="logo-text">Naval</span>
                </div>
                
                <h1>Te damos la bienvenida</h1>
                <p class="login-subtitle">Inicia sesión para planificar tu próxima aventura.</p>

                <button class="btn-google" id="btn-google-login">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google Logo" class="google-icon">
                    Continuar con Google
                </button>

                <div class="login-divider">
                    <span>o iniciar sesión con email</span>
                </div>

                <form id="login-form">
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="login-options">
                        <label class="remember-me">
                            <input type="checkbox"> Recuérdame
                        </label>
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-submit">Iniciar Sesión</button>
                </form>
                
                <p class="login-footer">¿No tienes cuenta? <a href="#">Regístrate gratis</a></p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
